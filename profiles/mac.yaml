
# AARI-NEXUS Mac Profile (8 GB RAM)
# Development environment — MacBook Air

profile: mac
description: "MacBook development terminal — SLM-optimized for 8 GB RAM"

hardware:
  ram_gb: 8
  gpu: apple_silicon_unified
  storage: local

models:
  primary: phi3:mini        # 2.2 GB — daily driver
  secondary: qwen2.5:3b     # 2.0 GB — stronger reasoning
  tertiary: gemma2:2b       # 1.6 GB — fastest, lightest
  embedding: nomic-embed-text

constraints:
  max_model_size_gb: 5
  avoid:
    - llama3:70b
    - mixtral
    - llama3:13b
  recommended_free_ram_gb: 4

performance:
  phi3_mini:
    tokens_per_sec: ~35
    latency_first_token_ms: ~800
  qwen2_5_3b:
    tokens_per_sec: ~28
    latency_first_token_ms: ~1100
  gemma2_2b:
    tokens_per_sec: ~45
    latency_first_token_ms: ~600

tips:
  - "Close Chrome tabs before running Mistral 7B or Llama3 8B"
  - "phi3:mini is recommended for all daily use on this machine"
  - "Keep 4-5 GB RAM free for stable inference"
